<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tina后台</title>
</head>
<body>
  <script src="https://unpkg.com/tinacms/dist/index.js"></script>
  <script>
    // 这段脚本会自动识别你的 Client ID
    window.addEventListener('DOMContentLoaded', () => {
      const cms = new window.TinaCMS({
        clientId: '你的那串ID', 
        branch: 'master',
        isLocalClient: false,
      });
      cms.enable();
    });
  </script>
</body>
</html>
